
<style>
*{box-sizing:border-box;margin:0;padding:0}
.wrap{padding:1rem 0;font-family:var(--font-sans)}
.top-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;flex-wrap:wrap;gap:10px}
.top-left{display:flex;align-items:center;gap:10px}
.page-title{font-size:20px;font-weight:500;color:var(--color-text-primary)}
.nav-btn{background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:5px 10px;cursor:pointer;font-size:13px;color:var(--color-text-secondary)}
.nav-btn:hover{background:var(--color-background-primary);color:var(--color-text-primary)}
.week-label{font-size:14px;font-weight:500;color:var(--color-text-primary);min-width:170px;text-align:center}
.view-toggle{display:flex;background:var(--color-background-secondary);border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-tertiary);overflow:hidden}
.view-btn{padding:5px 11px;font-size:12px;cursor:pointer;border:none;background:transparent;color:var(--color-text-secondary)}
.view-btn.active{background:var(--color-background-primary);color:var(--color-text-primary);font-weight:500}
.add-btn{background:#185FA5;color:#E6F1FB;border:none;border-radius:var(--border-radius-md);padding:6px 13px;font-size:13px;font-weight:500;cursor:pointer}
.add-btn:hover{background:#0C447C}

.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:1.25rem}
.stat-card{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:10px 12px}
.stat-label{font-size:11px;color:var(--color-text-secondary);margin-bottom:3px;text-transform:uppercase;letter-spacing:0.05em}
.stat-val{font-size:20px;font-weight:500;color:var(--color-text-primary)}
.stat-sub{font-size:11px;margin-top:1px}
.up{color:#3B6D11}.warn{color:#854F0B}

.week-grid-wrap{border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);overflow:hidden;background:var(--color-background-primary)}
.week-header{display:grid;grid-template-columns:52px repeat(7,1fr);border-bottom:0.5px solid var(--color-border-tertiary);background:var(--color-background-secondary)}
.wh-time{border-right:0.5px solid var(--color-border-tertiary)}
.wh-day{padding:8px 6px;text-align:center;border-right:0.5px solid var(--color-border-tertiary)}
.wh-day:last-child{border-right:none}
.wh-dayname{font-size:11px;font-weight:500;color:var(--color-text-secondary);text-transform:uppercase;letter-spacing:0.05em}
.wh-daynum{font-size:18px;font-weight:500;color:var(--color-text-primary);line-height:1.2;margin-top:2px}
.wh-day.today .wh-daynum{background:#185FA5;color:#E6F1FB;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:2px auto 0}
.wh-day.today .wh-dayname{color:#185FA5}

.time-body{display:grid;grid-template-columns:52px repeat(7,1fr)}
.time-col{border-right:0.5px solid var(--color-border-tertiary)}
.time-slot{height:52px;border-bottom:0.5px solid var(--color-border-tertiary);display:flex;align-items:flex-start;justify-content:flex-end;padding:4px 6px 0 0}
.time-slot:last-child{border-bottom:none}
.time-label{font-size:10px;color:var(--color-text-tertiary);white-space:nowrap}
.day-col{border-right:0.5px solid var(--color-border-tertiary);position:relative}
.day-col:last-child{border-right:none}
.day-slot{height:52px;border-bottom:0.5px solid var(--color-border-tertiary);position:relative}
.day-slot:last-child{border-bottom:none}
.day-slot.now-line::before{content:'';position:absolute;left:0;right:0;top:26px;height:1.5px;background:#E24B4A;z-index:2}

.ev-block{position:absolute;left:2px;right:2px;border-radius:4px;padding:3px 5px;font-size:10px;font-weight:500;cursor:pointer;overflow:hidden;z-index:1;transition:opacity 0.1s}
.ev-block:hover{opacity:0.85}
.ev-blue{background:#B5D4F4;color:#042C53}
.ev-green{background:#C0DD97;color:#173404}
.ev-amber{background:#FAC775;color:#412402}
.ev-red{background:#F7C1C1;color:#501313}
.ev-purple{background:#CECBF6;color:#26215C}
.ev-teal{background:#9FE1CB;color:#04342C}

.legend-row{display:flex;align-items:center;gap:14px;margin-top:.75rem;flex-wrap:wrap}
.leg-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--color-text-secondary)}
.leg-dot{width:9px;height:9px;border-radius:2px;flex-shrink:0}

.quick-actions{display:flex;flex-wrap:wrap;gap:8px;margin-top:1.25rem}
.qa-btn{flex:1;min-width:110px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);padding:8px 10px;cursor:pointer;background:var(--color-background-primary);color:var(--color-text-primary);font-size:11px;font-weight:500;text-align:center}
.qa-btn:hover{background:var(--color-background-secondary)}
.qa-icon{font-size:15px;margin-bottom:3px;display:block}
</style>

<div class="wrap">
<h2 class="sr-only">Car hire admin week view calendar for April 21–27, 2026</h2>

<div class="top-bar">
  <div class="top-left">
    <div class="page-title">Fleet Calendar</div>
    <button class="nav-btn" id="prevWeek">&#8592;</button>
    <div class="week-label" id="weekLabel">Apr 21 – 27, 2026</div>
    <button class="nav-btn" id="nextWeek">&#8594;</button>
    <button class="nav-btn" id="todayBtn">Today</button>
  </div>
  <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
    <div class="view-toggle">
      <button class="view-btn" onclick="sendPrompt('Switch the admin calendar to Month view')">Month</button>
      <button class="view-btn active">Week</button>
      <button class="view-btn" onclick="sendPrompt('Switch the admin calendar to Day view')">Day</button>
      <button class="view-btn" onclick="sendPrompt('Switch the admin calendar to Timeline view')">Timeline</button>
    </div>
    <button class="add-btn" onclick="sendPrompt('Add a new car rental booking for this week')">+ New Booking</button>
  </div>
</div>

<div class="stats-row">
  <div class="stat-card">
    <div class="stat-label">This week</div>
    <div class="stat-val">18</div>
    <div class="stat-sub" style="color:var(--color-text-secondary)">bookings total</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">Pickups</div>
    <div class="stat-val">9</div>
    <div class="stat-sub up">3 today</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">Returns</div>
    <div class="stat-val">7</div>
    <div class="stat-sub" style="color:var(--color-text-secondary)">2 today</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">Pending</div>
    <div class="stat-val">2</div>
    <div class="stat-sub warn">Needs action</div>
  </div>
</div>

<div class="week-grid-wrap">
  <div class="week-header" id="weekHeader">
    <div class="wh-time"></div>
  </div>
  <div class="time-body">
    <div class="time-col" id="timeCol"></div>
    <div id="dayCols" style="display:contents"></div>
  </div>
</div>

<div class="legend-row">
  <span style="font-size:11px;color:var(--color-text-secondary);font-weight:500">Legend:</span>
  <div class="leg-item"><div class="leg-dot" style="background:#B5D4F4"></div>Pickup</div>
  <div class="leg-item"><div class="leg-dot" style="background:#C0DD97"></div>Return</div>
  <div class="leg-item"><div class="leg-dot" style="background:#FAC775"></div>Pending</div>
  <div class="leg-item"><div class="leg-dot" style="background:#F7C1C1"></div>Overdue</div>
  <div class="leg-item"><div class="leg-dot" style="background:#CECBF6"></div>Maintenance</div>
  <div class="leg-item"><div class="leg-dot" style="background:#9FE1CB"></div>Long-term</div>
  <div class="leg-item" style="margin-left:4px"><div style="width:18px;height:2px;background:#E24B4A;border-radius:1px"></div><span style="margin-left:5px">Now</span></div>
</div>

<div class="quick-actions">
  <button class="qa-btn" onclick="sendPrompt('Show all overdue returns this week and send reminders')">
    <span class="qa-icon">⏰</span>Overdue alerts
  </button>
  <button class="qa-btn" onclick="sendPrompt('Generate a revenue report for this week')">
    <span class="qa-icon">📊</span>Week revenue
  </button>
  <button class="qa-btn" onclick="sendPrompt('Which cars need maintenance or service this week?')">
    <span class="qa-icon">🔧</span>Maintenance due
  </button>
  <button class="qa-btn" onclick="sendPrompt('Show optimal pricing for high demand days this week')">
    <span class="qa-icon">💡</span>Smart pricing
  </button>
  <button class="qa-btn" onclick="sendPrompt('Export this weeks schedule as PDF')">
    <span class="qa-icon">📄</span>Export week
  </button>
</div>

</div>

<script>
const HOURS = ['8 AM','9 AM','10 AM','11 AM','12 PM','1 PM','2 PM','3 PM','4 PM','5 PM','6 PM','7 PM'];
const HOUR_START = 8;
const DAY_NAMES = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

const EVENTS_SEED = [
  {dayOffset:0, hour:9,  dur:1,   cls:'ev-blue',   label:'BMW Pickup · Kumar'},
  {dayOffset:0, hour:11, dur:1.5, cls:'ev-green',  label:'Fortuner Return · Rao'},
  {dayOffset:0, hour:14, dur:1,   cls:'ev-blue',   label:'Q7 Pickup · Patel'},
  {dayOffset:0, hour:17, dur:1,   cls:'ev-green',  label:'Innova Return'},
  {dayOffset:1, hour:9,  dur:2,   cls:'ev-teal',   label:'Long-term · Sharma'},
  {dayOffset:1, hour:13, dur:1,   cls:'ev-amber',  label:'Pending · Mehta'},
  {dayOffset:1, hour:16, dur:1,   cls:'ev-purple', label:'Maint: RAV-001'},
  {dayOffset:2, hour:10, dur:1,   cls:'ev-blue',   label:'Mercedes Pickup'},
  {dayOffset:2, hour:15, dur:1.5, cls:'ev-green',  label:'Audi Q7 Return'},
  {dayOffset:3, hour:8,  dur:1,   cls:'ev-blue',   label:'Fortuner Pickup'},
  {dayOffset:3, hour:11, dur:1,   cls:'ev-red',    label:'Overdue: MH-04'},
  {dayOffset:3, hour:14, dur:2,   cls:'ev-teal',   label:'Long-term · Singh'},
  {dayOffset:4, hour:9,  dur:1,   cls:'ev-blue',   label:'Sedan Pickup x2'},
  {dayOffset:4, hour:12, dur:1,   cls:'ev-green',  label:'BMW Return'},
  {dayOffset:4, hour:15, dur:1,   cls:'ev-amber',  label:'Pending · Gupta'},
  {dayOffset:5, hour:10, dur:1.5, cls:'ev-blue',   label:'SUV Pickup'},
  {dayOffset:5, hour:14, dur:1,   cls:'ev-green',  label:'Sedan Return'},
  {dayOffset:6, hour:11, dur:1,   cls:'ev-purple', label:'Fleet check'},
];

let weekStart = new Date(2026, 3, 21);

function getWeekDates(start){
  return Array.from({length:7},(_,i)=>{
    const d = new Date(start);
    d.setDate(start.getDate()+i);
    return d;
  });
}

function formatWeekLabel(dates){
  const a = dates[0], b = dates[6];
  if(a.getMonth()===b.getMonth()) return `${MONTHS[a.getMonth()]} ${a.getDate()} – ${b.getDate()}, ${a.getFullYear()}`;
  return `${MONTHS[a.getMonth()]} ${a.getDate()} – ${MONTHS[b.getMonth()]} ${b.getDate()}, ${a.getFullYear()}`;
}

function isToday(d){
  const now = new Date(2026,3,21);
  return d.getFullYear()===now.getFullYear()&&d.getMonth()===now.getMonth()&&d.getDate()===now.getDate();
}

function render(){
  const dates = getWeekDates(weekStart);
  document.getElementById('weekLabel').textContent = formatWeekLabel(dates);

  const header = document.getElementById('weekHeader');
  header.innerHTML = '<div class="wh-time"></div>';
  dates.forEach((d,i)=>{
    const div = document.createElement('div');
    div.className = 'wh-day'+(isToday(d)?' today':'');
    div.innerHTML = `<div class="wh-dayname">${DAY_NAMES[d.getDay()]}</div><div class="wh-daynum">${d.getDate()}</div>`;
    header.appendChild(div);
  });

  const timeCol = document.getElementById('timeCol');
  timeCol.innerHTML = '';
  HOURS.forEach(h=>{
    const s = document.createElement('div');
    s.className = 'time-slot';
    s.innerHTML = `<span class="time-label">${h}</span>`;
    timeCol.appendChild(s);
  });

  const dayCols = document.getElementById('dayCols');
  dayCols.innerHTML = '';

  const todayIdx = dates.findIndex(d=>isToday(d));

  dates.forEach((d,di)=>{
    const col = document.createElement('div');
    col.className = 'day-col';

    HOURS.forEach((h,hi)=>{
      const slot = document.createElement('div');
      slot.className = 'day-slot';
      if(isToday(d) && hi===2) slot.classList.add('now-line');
      slot.onclick = ()=>sendPrompt(`Add booking on ${MONTHS[d.getMonth()]} ${d.getDate()} at ${HOURS[hi]}`);
      col.appendChild(slot);
    });

    EVENTS_SEED.filter(e=>e.dayOffset===di).forEach(e=>{
      const slotIdx = e.hour - HOUR_START;
      const topPx = slotIdx * 52 + 3;
      const heightPx = e.dur * 52 - 6;
      const block = document.createElement('div');
      block.className = `ev-block ${e.cls}`;
      block.style.cssText = `top:${topPx}px;height:${heightPx}px`;
      block.textContent = e.label;
      block.onclick = (ev)=>{ev.stopPropagation();sendPrompt(`Show details for booking: ${e.label}`);};
      col.appendChild(block);
    });

    dayCols.appendChild(col);
  });
}

render();

document.getElementById('prevWeek').onclick = ()=>{
  weekStart.setDate(weekStart.getDate()-7);
  weekStart = new Date(weekStart);
  render();
};
document.getElementById('nextWeek').onclick = ()=>{
  weekStart.setDate(weekStart.getDate()+7);
  weekStart = new Date(weekStart);
  render();
};
document.getElementById('todayBtn').onclick = ()=>{
  weekStart = new Date(2026,3,21);
  render();
};
document.querySelectorAll('.view-btn').forEach(b=>{
  b.addEventListener('click',function(){
    document.querySelectorAll('.view-btn').forEach(x=>x.classList.remove('active'));
    this.classList.add('active');
  });
});
</script>
